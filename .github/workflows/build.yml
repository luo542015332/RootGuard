name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Clean Gradle Build
      run: ./gradlew clean --no-daemon

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/PandaSU-v1.2.0.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PandaSU-APK-v1.2.0
        path: app/build/outputs/apk/debug/PandaSU-v1.2.0.apk
        retention-days: 30

    - name: Create Release
      if: github.event.inputs.create_release == 'true' || (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'release:'))
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.2.0
        name: PandaSU v1.2.0
        body: |
          ## 📦 PandaSU v1.2.0

          ### ✨ 新功能
          - 模块备份和恢复功能
          - 应用类型筛选（系统/用户应用）
          - 日志功能优化

          ### 🐛 修复
          - 修复日志提取闪退问题
          - 修复变量名冲突问题

          ### 📝 说明
          - 构建 #${{ github.run_number }}
          - 提交: ${{ github.sha }}

          ### 🐼 更新
          - 更新应用图标为可爱熊猫
        files: app/build/outputs/apk/debug/PandaSU-v1.2.0.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
