name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: |
        mkdir -p "$ANDROID_SDK/licenses"
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_SDK/licenses/android-sdk-license"
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_SDK/licenses/android-sdk-preview-license"
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > "$ANDROID_SDK/licenses/android-sdk-arm-dbt-license"
        echo "5f2486612d05b68866c7855eb1a0343f629d23c0" > "$ANDROID_SDK/licenses/google-android-ndk-license"
        echo "33b6a2b646078cb45c015d0c9d53acdefd37b0d6" > "$ANDROID_SDK/licenses/google-android-ndk-license-2"
        echo "859f298618e403a979e1189c89909e05d6128426" > "$ANDROID_SDK/licenses/google-android-play-services-license"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PandaSU-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 1
        if-no-files-found: error
