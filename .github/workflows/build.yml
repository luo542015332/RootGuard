name: Build APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'app/build.gradle'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Auto increment version
      run: |
        # 读取当前版本 - 使用 sed 提取
        versionCode=$(sed -n 's/.*versionCode \([0-9]*\).*/\1/p' app/build.gradle)
        versionName=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)

        # 增加版本号
        newVersionCode=$((versionCode + 1))

        # 提取版本号各部分
        major=$(echo $versionName | cut -d. -f1)
        minor=$(echo $versionName | cut -d. -f2)
        patch=$(echo $versionName | cut -d. -f3)
        newPatch=$((patch + 1))
        newVersionName="$major.$minor.$newPatch"

        # 更新 build.gradle
        sed -i "s/versionCode $versionCode/versionCode $newVersionCode/" app/build.gradle
        sed -i "s/versionName \"$versionName\"/versionName \"$newVersionName\"/" app/build.gradle

        # 更新 workflow 中的版本号
        sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/v$newVersionName/g" .github/workflows/build.yml

        echo "New version: $newVersionName (code: $newVersionCode)"
        echo "VERSION_NAME=$newVersionName" >> $GITHUB_ENV
        echo "VERSION_CODE=$newVersionCode" >> $GITHUB_ENV

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Clean Gradle Build
      run: ./gradlew clean --no-daemon

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/PandaSU-${{ env.VERSION_NAME }}.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PandaSU-APK-${{ env.VERSION_NAME }}
        path: app/build/outputs/apk/debug/PandaSU-${{ env.VERSION_NAME }}.apk
        retention-days: 30

    - name: Create Release
      if: github.event.inputs.create_release == 'true' || (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'release:'))
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.VERSION_NAME }}
        name: PandaSU v${{ env.VERSION_NAME }}
        body: |
          ## 📦 PandaSU v${{ env.VERSION_NAME }}

          ### 🐛 重要修复
          - 修复启动闪退问题 - 源代码未编译到 APK
          - 修复项目目录结构混乱问题

          ### 🔧 改进
          - 优化构建流程，确保源代码正确编译
          - 更新版本号到 v${{ env.VERSION_NAME }}

          ### 📝 说明
          - 构建 #${{ github.run_number }}
          - 提交: ${{ github.sha }}

          ### 🐼 更新
          - 更新应用图标为可爱熊猫
        files: app/build/outputs/apk/debug/PandaSU-${{ env.VERSION_NAME }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
