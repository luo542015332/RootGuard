name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new release'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Read version from build.gradle
      run: |
        # 读取当前版本
        versionCode=$(sed -n 's/.*versionCode \([0-9]*\).*/\1/p' app/build.gradle)
        versionName=$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)

        echo "Current version: $versionName (code: $versionCode)"
        echo "VERSION_NAME=$versionName" >> $GITHUB_ENV
        echo "VERSION_CODE=$versionCode" >> $GITHUB_ENV

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Clean Gradle Build
      run: ./gradlew clean --no-daemon

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/PandaSU-${{ env.VERSION_NAME }}.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PandaSU-APK-${{ env.VERSION_NAME }}
        path: app/build/outputs/apk/debug/PandaSU-${{ env.VERSION_NAME }}.apk
        retention-days: 30

    - name: Create Release
      if: github.event.inputs.create_release == 'true' || (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'release:'))
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.VERSION_NAME }}
        name: PandaSU v${{ env.VERSION_NAME }}
        body: |
          ## 📦 PandaSU v${{ env.VERSION_NAME }}

          ### 🐛 重要修复
          - 修复自动更新功能的编译错误
          - 添加应用内自动更新功能

          ### 🔧 改进
          - 优化构建流程
          - 添加版本更新检测

          ### 📝 说明
          - 构建 #${{ github.run_number }}
          - 提交: ${{ github.sha }}

          ### 🐼 更新
          - 更新应用图标为可爱熊猫
        files: app/build/outputs/apk/debug/PandaSU-${{ env.VERSION_NAME }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
