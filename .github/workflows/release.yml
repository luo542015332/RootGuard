name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.3.1)'
        required: true
        default: 'v1.3.1'
      title:
        description: 'Release title'
        required: true
        default: 'PandaSU v1.3.1'
      notes:
        description: 'Release notes'
        required: true
        default: '🎉 PandaSU 发布'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version Name
        id: version
        run: echo "version=$(grep 'versionName' app/build.gradle | awk '{print $2}' | tr -d '"')" >> $GITHUB_OUTPUT

      - name: Download APK from latest build
        run: |
          # 获取最新的成功 Actions run ID
          RUN_ID=$(gh run list --repo luo542015332/RootGuard --workflow=build.yml --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Latest successful build run ID: $RUN_ID"

          # 下载 artifact 到当前目录
          gh run download $RUN_ID --repo luo542015332/RootGuard --name PandaSU-APK-${{ steps.version.outputs.version }} --dir ./apk-download/
          
          # 检查下载的文件
          echo "Downloaded files:"
          find ./apk-download/ -type f
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: ${{ github.event.inputs.title || format('PandaSU {0}', github.ref_name) }}
          body: ${{ github.event.inputs.notes || format('PandaSU {0} Release', github.ref_name) }}
          files: ./apk-download/PandaSU-${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
